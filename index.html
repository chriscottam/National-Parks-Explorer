<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>National Parks Explorer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Source+Sans+3:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  :root {
    --forest: #1a3a2a;
    --moss: #3d6b4f;
    --sage: #7a9e7e;
    --sand: #e8d5a3;
    --stone: #c4a882;
    --sky: #4a7fa5;
    --cream: #faf6ef;
    --bark: #5c3d1e;
    --gold: #c9960c;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Source Sans 3', sans-serif;
    background: var(--cream);
    color: var(--forest);
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  @media (max-width: 700px) {
    body { height: auto; overflow: auto; }
  }

  header {
    background: var(--forest);
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 16px;
    flex-shrink: 0;
    border-bottom: 3px solid var(--gold);
  }

  @media (max-width: 700px) {
    header { padding: 10px 14px; gap: 10px; }
    header h1 { font-size: 1.15rem; }
    .logo-icon { font-size: 22px; }
  }

  .logo-icon {
    font-size: 28px;
    line-height: 1;
  }

  header h1 {
    font-family: 'Playfair Display', serif;
    font-size: 1.5rem;
    color: var(--sand);
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  header h1 span {
    color: var(--gold);
  }

  .badge {
    margin-left: auto;
    background: var(--moss);
    color: var(--sand);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.8rem;
    font-weight: 600;
  }

  .main-layout {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  @media (max-width: 700px) {
    .main-layout {
      flex-direction: column;
      overflow: visible;
      flex: none;
    }
  }

  /* SIDEBAR */
  .sidebar {
    width: 340px;
    flex-shrink: 0;
    background: white;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid #e0d8cc;
  }

  @media (max-width: 700px) {
    .sidebar {
      width: 100%;
      border-right: none;
      border-bottom: 1px solid #e0d8cc;
      overflow: visible;
    }
  }

  .filters {
    padding: 16px;
    background: var(--forest);
    flex-shrink: 0;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    margin-bottom: 8px;
  }

  .filter-row:last-child { margin-bottom: 0; }

  .filter-group {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .filter-group label {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--sage);
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  select, input[type="text"] {
    width: 100%;
    padding: 7px 10px;
    border: 1px solid var(--moss);
    border-radius: 6px;
    background: rgba(255,255,255,0.08);
    color: var(--sand);
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.85rem;
    appearance: none;
    cursor: pointer;
    outline: none;
    transition: border-color 0.2s, background 0.2s;
  }

  select option { background: var(--forest); color: var(--sand); }

  select:focus, input[type="text"]:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.12);
  }

  input[type="text"]::placeholder { color: rgba(232,213,163,0.45); }

  .results-header {
    padding: 10px 16px 6px;
    background: var(--cream);
    border-bottom: 1px solid #e0d8cc;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .results-header span {
    font-size: 0.8rem;
    color: var(--moss);
    font-weight: 600;
  }

  .clear-btn {
    background: none;
    border: 1px solid var(--stone);
    color: var(--bark);
    font-size: 0.72rem;
    padding: 2px 8px;
    border-radius: 4px;
    cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    transition: all 0.15s;
  }
  .clear-btn:hover { background: var(--stone); color: white; }

  .parks-list {
    overflow-y: auto;
    flex: 1;
  }

  @media (max-width: 700px) {
    .parks-list {
      max-height: 320px;
    }
  }

  .park-item {
    padding: 10px 16px;
    border-bottom: 1px solid #f0ebe2;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
  }

  .park-item:hover { background: #f7f2ea; }
  .park-item.active { background: #eef5f0; border-left: 3px solid var(--moss); }

  .park-name {
    font-family: 'Playfair Display', serif;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--forest);
    line-height: 1.3;
    margin-bottom: 3px;
  }

  .park-meta {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }

  .tag {
    font-size: 0.68rem;
    padding: 1px 7px;
    border-radius: 10px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }

  .tag-state { background: #e8f4ec; color: var(--moss); }
  .tag-region { background: #e8eef4; color: var(--sky); }
  .tag-type { background: #f4ede8; color: var(--bark); max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .no-coords { opacity: 0.55; }
  .no-coords::after {
    content: '⚠ no map data';
    font-size: 0.65rem;
    color: #aaa;
    display: block;
    margin-top: 2px;
  }

  /* MAP */
  #map {
    flex: 1;
    z-index: 0;
  }

  @media (max-width: 700px) {
    #map {
      flex: none;
      height: 60vw;
      min-height: 280px;
    }
  }

  /* Custom marker popup */
  .popup-title {
    font-family: 'Playfair Display', serif;
    font-size: 1rem;
    font-weight: 700;
    color: var(--forest);
    margin-bottom: 4px;
  }
  .popup-detail { font-size: 0.8rem; color: #555; line-height: 1.6; }
  .popup-detail strong { color: var(--forest); }
  .popup-link {
    display: inline-block;
    margin-top: 6px;
    font-size: 0.78rem;
    color: var(--sky);
    text-decoration: none;
    font-weight: 600;
  }
  .popup-link:hover { text-decoration: underline; }

  /* Leaflet overrides */
  .leaflet-popup-content-wrapper {
    border-radius: 8px !important;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15) !important;
  }

  /* Scrollbar styling */
  .parks-list::-webkit-scrollbar { width: 5px; }
  .parks-list::-webkit-scrollbar-track { background: #f0ebe2; }
  .parks-list::-webkit-scrollbar-thumb { background: var(--stone); border-radius: 3px; }

  .empty-state {
    padding: 32px 16px;
    text-align: center;
    color: #aaa;
    font-size: 0.9rem;
  }
  .empty-state .icon { font-size: 2.5rem; margin-bottom: 8px; }
</style>
</head>
<body>

<header>
  <span class="logo-icon">🏕</span>
  <h1>National Parks <span>Explorer</span></h1>
  <div class="badge" id="total-badge">437 parks</div>
</header>

<div class="main-layout">
  <div class="sidebar">
    <div class="filters">
      <div class="filter-row">
        <div class="filter-group" style="flex:2">
          <label>Search by Name</label>
          <input type="text" id="search-input" placeholder="e.g. Yellowstone, Grand...">
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <label>State</label>
          <select id="state-filter">
            <option value="">All States</option>
          </select>
        </div>
        <div class="filter-group">
          <label>Region</label>
          <select id="region-filter">
            <option value="">All Regions</option>
          </select>
        </div>
      </div>
      <div class="filter-row">
        <div class="filter-group">
          <label>Park Type</label>
          <select id="type-filter">
            <option value="">All Types</option>
          </select>
        </div>
      </div>
    </div>

    <div class="results-header">
      <span id="result-count">Loading...</span>
      <button class="clear-btn" onclick="clearFilters()">Clear Filters</button>
    </div>

    <div class="parks-list" id="parks-list"></div>
  </div>

  <div id="map"></div>
</div>

const states = [...new Set(PARKS_DATA.map(p=>p.state))].sort();
const regions = [...new Set(PARKS_DATA.map(p=>p.region))].sort();
const types = [...new Set(PARKS_DATA.map(p=>p.type))].sort();

const stateEl = document.getElementById('state-filter');
states.forEach(s => { const o = document.createElement('option'); o.value=s; o.textContent=`${s} — ${STATE_NAMES[s]||s}`; stateEl.appendChild(o); });

regions.forEach(r => { const o = document.createElement('option'); o.value=r; o.textContent=`${REGION_NAMES[r]||r}`; regionEl.appendChild(o); });

types.forEach(t => { const o = document.createElement('option'); o.value=t; o.textContent=t; typeEl.appendChild(o); });

// ============================================================
// FILTER + RENDER
// ============================================================
let filteredParks = [...PARKS_DATA];

function getFilters() {
  return {
    search: document.getElementById('search-input').value.toLowerCase().trim(),
    state: document.getElementById('state-filter').value,
    region: document.getElementById('region-filter').value,
    type: document.getElementById('type-filter').value,
  };
}

function applyFilters() {
  const f = getFilters();
  filteredParks = PARKS_DATA.filter(p => {
    if(f.search && !p.name.toLowerCase().includes(f.search) && !p.parkname.toLowerCase().includes(f.search) && !p.code.toLowerCase().includes(f.search)) return false;
    if(f.state && p.state !== f.state) return false;
    if(f.region && p.region !== f.region) return false;
    if(f.type && p.type !== f.type) return false;
    return true;
  });
  renderList();
  renderMarkers();
}

function renderList() {
  const list = document.getElementById('parks-list');
  const count = document.getElementById('result-count');
  count.textContent = `${filteredParks.length} result${filteredParks.length!==1?'s':''}`;

  if(filteredParks.length === 0) {
    list.innerHTML = `<div class="empty-state"><div class="icon">🌲</div>No parks match your filters.<br>Try broadening your search.</div>`;
    return;
  }

  list.innerHTML = filteredParks.map(p => {
    const hasCoords = p.lat !== undefined;
    return `<div class="park-item${hasCoords?'':' no-coords'}" data-id="${p.id}" onclick="selectPark('${p.id}')">
      <div class="park-name">${p.name}</div>
      <div class="park-meta">
        <span class="tag tag-state">${p.state}</span>
        <span class="tag tag-region">${REGION_NAMES[p.region]||p.region}</span>
        <span class="tag tag-type" title="${p.type}">${p.type}</span>
      </div>
    </div>`;
  }).join('');
}

function renderMarkers() {
  // Remove old markers
  Object.values(markers).forEach(m => map.removeLayer(m));
  markers = {};

  const withCoords = filteredParks.filter(p => p.lat);
  withCoords.forEach(p => {
    const m = L.marker([p.lat, p.lng], {icon: defaultIcon}).addTo(map);
    m.bindPopup(`
      <div class="popup-title">${p.name}</div>
      <div class="popup-detail">
        <strong>Code:</strong> ${p.code}<br>
        <strong>State:</strong> ${STATE_NAMES[p.state]||p.state}<br>
        <strong>Region:</strong> ${REGION_NAMES[p.region]||p.region}<br>
        <strong>Type:</strong> ${p.type}
      </div>
      <a class="popup-link" href="https://www.nps.gov/${p.code.toLowerCase()}/" target="_blank">Visit NPS Page ↗</a>
    `);
    m.on('click', () => selectPark(p.id, false));
    markers[p.id] = m;
  });

  // If only a few results, fit to them
  if(withCoords.length > 0 && withCoords.length < 50) {
    const group = L.featureGroup(withCoords.map(p => L.marker([p.lat, p.lng])));
    map.fitBounds(group.getBounds().pad(0.2), {maxZoom: 10});
  }
}

function selectPark(id, scrollIntoView=true) {
  const park = PARKS_DATA.find(p => p.id === id);
  if(!park) return;

  // Highlight list item
  if(activeItem) activeItem.classList.remove('active');
  const item = document.querySelector(`[data-id="${id}"]`);
  if(item) {
    item.classList.add('active');
    activeItem = item;
    if(scrollIntoView) item.scrollIntoView({behavior:'smooth', block:'nearest'});
  }

  // Highlight marker
  if(activeMarker) activeMarker.setIcon(defaultIcon);
  if(markers[id]) {
    markers[id].setIcon(activeIcon);
    markers[id].openPopup();
    activeMarker = markers[id];
    if(park.lat) map.setView([park.lat, park.lng], Math.max(map.getZoom(), 9), {animate:true});
  }
}

function clearFilters() {
  document.getElementById('search-input').value = '';
  document.getElementById('state-filter').value = '';
  document.getElementById('region-filter').value = '';
  document.getElementById('type-filter').value = '';
  applyFilters();
}

// Event listeners
['state-filter','region-filter','type-filter'].forEach(id => document.getElementById(id).addEventListener('change', applyFilters));
document.getElementById('search-input').addEventListener('input', applyFilters);

// Initial render
applyFilters();
document.getElementById('total-badge').textContent = `${PARKS_DATA.length} parks`;
</script>
</body>
</html>
